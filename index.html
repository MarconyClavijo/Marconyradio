<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Radio La Tremenda 106.5 FM</title>

<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

<header class="header">

<div class="logo">

<img src="assets/logo.png">

</div>

<div class="menu">

<i class="fa-solid fa-bars"></i>

</div>

</header>

<section class="banner">

<img src="assets/banner.png">

</section>

<section class="player-card">

<div class="live">

<span class="dot"></span>

EN VIVO

</div>

<div id="cover" class="cover">

<img src="assets/default.jpg">

</div>

<h2 id="song">

Cargando canción...

</h2>

<p id="artist">

Esperando transmisión...

</p>

<div class="programa">

<i class="fa-solid fa-microphone"></i>

<span id="dj">

Radio La Tremenda

</span>

</div>

<div class="listeners">

<i class="fa-solid fa-headphones"></i>

<span id="listeners">

0 Oyentes

</span>

</div>

<div class="controls">

<button id="play">

<i class="fa-solid fa-play"></i>

</button>

<input
type="range"
id="volume"
min="0"
max="1"
step="0.01"
value="1">

</div>

<audio id="audio">

<source src="https://radiostreaming.pro/8238/stream">

</audio>

</section>

<section class="history">

<h2>

SONÓ EN LA TREMENDA

</h2>

<div id="history">

Cargando historial...

</div>

</section>

<div class="mini-player">

<div class="mini-cover">

<img id="miniArt"

src="assets/default.jpg">

</div>

<div class="mini-info">

<div id="miniSong">

Radio La Tremenda

</div>

<div id="miniArtist">

106.5 FM

</div>

</div>

<button id="miniPlay">

<i class="fa-solid fa-play"></i>

</button>

</div>

<a class="whatsapp"

href="https://wa.me/51942883375"

target="_blank">

<i class="fab fa-whatsapp"></i>

</a>

<script src="script.js"></script>

<script

id="sonic_js"

data-port="8238"

src="https://radiostreaming.pro/cp/widgets.js">

</script>

</body>

</html>
