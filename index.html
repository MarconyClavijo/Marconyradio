<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La Tremenda 106.5 FM</title>
<link href="https://googleapis.com" rel="stylesheet">
<style>
/* DISEÑO DIRECTO INYECTADO - NO FALLA */
body { margin:0; font-family:'Poppins',sans-serif; background:#0b0e14; color:#fff; padding-bottom:90px; text-align:center; }
.navbar { display:flex; justify-content:space-between; align-items:center; padding:12px 20px; background:#0f141f; border-bottom:1px solid rgba(255,255,255,0.05); }
.nav-logo { height:40px; object-fit:contain; }
.menu-btn { font-size:24px; cursor:pointer; background:none; border:none; color:#fff; }
.nav-menu { display:none; flex-direction:column; background:#0f141f; padding:5px 20px; border-bottom:1px solid rgba(255,255,255,0.05); text-align:left; }
.nav-menu a { color:#fff; text-decoration:none; padding:10px 0; font-size:14px; opacity:0.8; }
.banner { width:100%; height:140px; background:linear-gradient(rgba(0,0,0,0.2),#0b0e14), url('assets/portada.png') no-repeat center center; background-size:cover; }
.app { max-width:400px; margin:-30px auto 20px auto; width:90%; background:rgba(20,26,38,0.95); border-radius:24px; padding:25px 20px; box-shadow:0 15px 35px rgba(0,0,0,0.6); box-sizing:border-box; position:relative; z-index:10; }
.status { color:#00d95f; font-size:12px; font-weight:900; margin-bottom:15px; letter-spacing:1px; }
.song { font-size:15px; font-weight:600; margin-bottom:20px; color:#fff; min-height:22px; }
.play { width:70px; height:70px; border-radius:50%; border:none; background:#00d95f; color:#fff; font-size:22px; cursor:pointer; box-shadow:0 8px 20px rgba(0,217,95,0.4); margin:0 auto; display:flex; justify-content:center; align-items:center; }
.volume { display:flex; align-items:center; gap:8px; margin-top:20px; font-size:12px; }
input[type=range] { flex:1; accent-color:#00d95f; cursor:pointer; }
.history { text-align:left; margin-top:25px; background:rgba(255,255,255,0.03); padding:15px; border-radius:15px; }
.history h3 { font-size:13px; margin:0 0 12px 0; color:#00d95f; text-transform:uppercase; }
.sonic_recent_tracks, table { width:100% !important; border-collapse:collapse; }
.sonic_recent_tracks td, tr { padding:8px 0; font-size:12px; border-bottom:1px solid rgba(255,255,255,0.05); color:rgba(255,255,255,0.8); }
.float-player { position:fixed; bottom:0; left:0; width:100%; background:#0f141f; padding:12px 20px; display:none; justify-content:space-between; align-items:center; box-sizing:border-box; z-index:999; border-top:1px solid rgba(255,255,255,0.05); }
.float-info { display:flex; align-items:center; gap:10px; max-width:70%; }
.float-img { width:35px; height:35px; object-fit:contain; }
.float-title { font-size:14px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.whatsapp-float { position:fixed; bottom:75px; right:20px; width:52px; height:52px; background:#25d366; border-radius:50%; display:flex; justify-content:center; align-items:center; box-shadow:0 4px 15px rgba(0,0,0,0.4); z-index:998; }
.whatsapp-float svg { width:26px; height:26px; fill:#fff; }
</style>
</head>
<body>

<!-- Barra superior con tu logo local -->
<div class="navbar">
    <img src="assets/logo.png" class="nav-logo" alt="La Tremenda">
    <button class="menu-btn" id="menuBtn">☰</button>
</div>

<!-- Menú Desplegable -->
<div class="nav-menu" id="navMenu">
    <a href="https://facebook.com" target="_blank">Facebook Oficial</a>
    <a href="https://wa.me" target="_blank">Contacto WhatsApp</a>
</div>

<!-- Banner de portada local -->
<div class="banner"></div>

<!-- Contenedor del Reproductor Estático -->
<div class="app" id="app">
    <div class="status" id="estado">🔴 EN VIVO</div>
    <div class="song"><span id="sonic_title">Cargando canción...</span></div>
    <button class="play" id="btn">▶</button>
    <div class="volume">
        <span>🔈</span><input type="range" min="0" max="1" step="0.01" value="1" id="volumen"><span>🔊</span>
    </div>

    <!-- Historial automático del widget -->
    <div class="history">
        <h3>🎵 Últimas 5 canciones</h3>
        <div id="sonic_recent_tracks">Cargando canciones pasadas...</div>
    </div>
</div>

<!-- Barra Inferior Flotante -->
<div class="float-player" id="floatBar">
    <div class="float-info">
        <img src="assets/logo.png" class="float-img" alt="Logo">
        <div class="float-title" id="sonic_title_float">La Tremenda 106.5 FM</div>
    </div>
    <button class="play" id="btnFloat" style="width:38px; height:38px; font-size:14px;">▶</button>
</div>

<!-- Botón Flotante de WhatsApp -->
<a href="https://wa.me" class="whatsapp-float" target="_blank">
    <svg viewBox="0 0 24 24"><path d="M.057 24l1.687-6.163c-1.041-1.804-1.588-3.849-1.587-5.946C.06 5.348 5.397.01 12.008.01c3.202.001 6.212 1.246 8.477 3.514 2.266 2.268 3.507 5.28 3.505 8.484-.004 6.657-5.34 11.997-11.953 11.997-2.005-.001-3.973-.502-5.713-1.457L0 24zm6.59-4.846c1.6.95 3.498 1.452 5.431 1.453 5.494 0 9.961-4.47 9.964-9.967.002-2.662-1.033-5.165-2.907-7.042C17.262 1.762 14.764 .724 12.008.724c-5.5 0-9.969 4.471-9.973 9.97-.001 1.924.501 3.805 1.458 5.41l-.997 3.637 3.731-.978zm11.391-6.163c-.305-.153-1.805-.891-2.084-.992-.279-.101-.482-.153-.684.153-.203.306-.783.992-.961 1.194-.178.203-.356.229-.661.077-.306-.152-1.291-.476-2.46-1.518-.91-.811-1.524-1.812-1.703-2.118-.178-.306-.019-.471.133-.622.137-.137.305-.356.458-.534.153-.178.203-.306.305-.51.101-.203.051-.381-.025-.533-.076-.153-.684-1.65-.937-2.257-.247-.602-.499-.522-.684-.531-.177-.008-.381-.01-.584-.01s-.533.076-.813.382c-.279.306-1.067 1.045-1.067 2.549 0 1.504 1.097 2.951 1.25 3.154.153.203 2.158 3.297 5.228 4.619.729.315 1.299.504 1.743.645.734.233 1.404.2 1.932.121.588-.088 1.805-.738 2.059-1.452.254-.715.254-1.324.178-1.452-.076-.127-.279-.203-.584-.356z"/></svg>
</a>

<!-- LÓGICA DE AUDIO DIRECTA Y SIN FALLAS -->
<script>
const btn = document.getElementById("btn"), btnFloat = document.getElementById("btnFloat");
const estado = document.getElementById("estado"), app = document.getElementById("app");
const floatBar = document.getElementById("floatBar"), vol = document.getElementById("volumen");
const menuBtn = document.getElementById("menuBtn"), navMenu = document.getElementById("navMenu");
let audio = null, sonando = false;

menuBtn.onclick = () => { navMenu.style.display = navMenu.style.display === "flex" ? "none" : "flex"; };

function crearAudio() {
    if (audio) { audio.pause(); audio.src = ""; audio.load(); }
    audio = new Audio();
    audio.src = "https://radiostreaming.pro";
    audio.crossOrigin = "anonymous";
    audio.volume = vol.value;
}

function alternarPlay() {
    if (!sonando) {
        crearAudio();
        estado.textContent = "⏳ Conectando..."; btn.textContent = "⏳"; btnFloat.textContent = "⏳";
        audio.play().then(() => {
            estado.textContent = "🎧 EN VIVO"; btn.textContent = "⏸"; btnFloat.textContent = "⏸"; sonando = true;
        }).catch(() => {
            estado.textContent = "⚠️ Error de señal"; btn.textContent = "▶"; btnFloat.textContent = "▶"; sonando = false;
        });
    } else {
        audio.pause(); audio.src = ""; audio.load();
        estado.textContent = "🔴 TRANSMISIÓN DETENIDA"; btn.textContent = "▶"; btnFloat.textContent = "▶"; sonando = false;
    }
}

btn.onclick = alternarPlay; btnFloat.onclick = alternarPlay;
vol.oninput = () => { if (audio) audio.volume = vol.value; };
window.onscroll = () => { floatBar.style.display = app.getBoundingClientRect().bottom < 0 ? "flex" : "none"; };

setInterval(() => {
    const txt = document.getElementById("sonic_title")?.textContent;
    if (txt && document.getElementById("sonic_title_float")) {
        document.getElementById("sonic_title_float").textContent = txt;
    }
}, 3000);
</script>

<script id='sonic_js' data-port='8238' src='https://radiostreaming.pro'></script>

</body>
</html>
