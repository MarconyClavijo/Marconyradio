<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La Tremenda 106.5 FM</title>
<link href="https://googleapis.com" rel="stylesheet">
<style>
body {
margin:0;
font-family:'Poppins',sans-serif;
background:#0b0e14;
color:#fff;
min-height:100vh;
padding-bottom:100px;
}

/* BANNER PRINCIPAL MODERNIZADO */
.banner-container {
width:100%;
height:240px;
background:linear-gradient(rgba(0,0,0,0.2), #0b0e14), url('http://imgfz.com') no-repeat center center;
background-size:cover;
display:flex;
justify-content:center;
align-items:center;
position:relative;
}

.logo-main {
max-width:180px;
filter:drop-shadow(0 4px 15px rgba(255,255,255,0.2));
}

/* REPRODUCTOR ESTÁTICO PRINCIPAL */
.main-player {
max-width:440px;
margin:-40px auto 30px auto;
background:rgba(20,26,38,0.95);
backdrop-filter:blur(15px);
border:1px solid rgba(255,255,255,0.08);
border-radius:24px;
padding:25px;
box-shadow:0 15px 35px rgba(0,0,0,0.5);
text-align:center;
position:relative;
z-index:10;
width:90%;
box-sizing:border-box;
}

.status-tag {
display:inline-block;
background:rgba(255,0,0,0.15);
color:#ff3b30;
padding:5px 12px;
border-radius:20px;
font-size:12px;
font-weight:700;
margin-bottom:15px;
text-transform:uppercase;
letter-spacing:1px;
border:1px solid rgba(255,0,0,0.2);
}

.status-tag.active {
background:rgba(0,217,95,0.15);
color:#00d95f;
border-color:rgba(0,217,95,0.2);
}

.current-song {
font-size:16px;
font-weight:600;
margin-bottom:20px;
color:#f5f5f7;
min-height:24px;
}

.big-play-btn {
width:80px;
height:80px;
border-radius:50%;
border:none;
background:#00d95f;
color:#fff;
font-size:24px;
cursor:pointer;
box-shadow:0 8px 25px rgba(0,217,95,0.4);
transition:0.3s ease;
display:flex;
justify-content:center;
align-items:center;
margin:0 auto 20px auto;
}

.big-play-btn:hover {
transform:scale(1.05);
background:#00c254;
}

.volume-container {
display:flex;
align-items:center;
gap:10px;
max-width:200px;
margin:0 auto;
}

.volume-container span { font-size:14px; opacity:0.6; }

input[type=range] {
flex:1;
accent-color:#00d95f;
cursor:pointer;
}

/* EQ VISUAL */
.eq-visual {
display:flex;
justify-content:center;
gap:4px;
height:25px;
margin-bottom:15px;
align-items:flex-end;
}

.eq-visual span {
width:4px;
height:5px;
background:#00d95f;
border-radius:2px;
transition:0.2s;
}

.playing .eq-visual span {
animation:bounce 0.6s infinite alternate;
}

.playing .eq-visual span:nth-child(1) { animation-delay:0.1s; }
.playing .eq-visual span:nth-child(2) { animation-delay:0.4s; }
.playing .eq-visual span:nth-child(3) { animation-delay:0.2s; }
.playing .eq-visual span:nth-child(4) { animation-delay:0.5s; }
.playing .eq-visual span:nth-child(5) { animation-delay:0.3s; }

@keyframes bounce {
0% { height:5px; }
100% { height:25px; }
}

/* REPRODUCTOR FLOTANTE INFERIOR */
.float-player {
position:fixed;
bottom:0;
left:0;
width:100%;
background:rgba(15,21,32,0.96);
backdrop-filter:blur(20px);
border-top:1px solid rgba(255,255,255,0.08);
padding:12px 20px;
display:none; /* Se activa dinámicamente con scroll */
justify-content:space-between;
align-items:center;
box-sizing:border-box;
z-index:999;
box-shadow:0 -10px 30px rgba(0,0,0,0.5);
}

.float-info {
display:flex;
align-items:center;
gap:12px;
max-width:70%;
}

.float-img {
width:45px;
height:45px;
border-radius:8px;
object-fit:cover;
}

.float-text {
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
}

.float-title { font-size:14px; font-weight:700; color:#fff; }
.float-sub { font-size:11px; color:#a1a1a6; }

.float-btn {
width:44px;
height:44px;
border-radius:50%;
border:none;
background:#00d95f;
color:#fff;
font-size:16px;
cursor:pointer;
display:flex;
justify-content:center;
align-items:center;
box-shadow:0 4px 15px rgba(0,217,95,0.3);
}

/* BOTÓN FLOTANTE DE WHATSAPP */
.whatsapp-float {
position:fixed;
bottom:85px;
right:20px;
width:56px;
height:56px;
background:#25d366;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
box-shadow:0 4px 15px rgba(37,211,102,0.4);
z-index:998;
transition:0.3s ease;
}

.whatsapp-float:hover { transform:scale(1.08); }
.whatsapp-float svg { width:30px; height:30px; fill:#fff; }

.footer-text {
text-align:center;
font-size:11px;
opacity:0.4;
margin:40px 0 20px 0;
}
</style>
</head>
<body>

<!-- Sección del Banner Superior -->
<div class="banner-container">
    <img src="http://imgfz.com" class="logo-main" alt="Logo">
</div>

<!-- Contenedor Principal / Reproductor Estático -->
<div class="main-player" id="mainCard">
    <div class="status-tag" id="statusTag">🔴 EN VIVO</div>
    
    <div class="eq-visual">
        <span></span><span></span><span></span><span></span><span></span>
    </div>

    <div class="current-song">
        <span id="sonic_title">Cargando canción...</span>
    </div>

    <button class="big-play-btn" id="btnMain">▶</button>

    <div class="volume-container">
        <span>🔈</span>
        <input type="range" min="0" max="1" step="0.01" value="1" id="volumen">
        <span>🔊</span>
    </div>
</div>

<div class="footer-text">
    &copy; Radio La Tremenda - Todos los derechos reservados.
</div>

<!-- Barra de Reproducción Flotante -->
<div class="float-player" id="floatBar">
    <div class="float-info">
        <img src="http://imgfz.com" class="float-img" alt="Mini Logo">
        <div class="float-text">
            <div class="float-title">Radio La Tremenda</div>
            <div class="float-sub" id="sonic_title_float">En Vivo</div>
        </div>
    </div>
    <button class="float-btn" id="btnFloat">▶</button>
</div>

<!-- Botón Flotante WhatsApp -->
<a href="https://wa.me" class="whatsapp-float" target="_blank">
    <svg viewBox="0 0 24 24"><path d="M.057 24l1.687-6.163c-1.041-1.804-1.588-3.849-1.587-5.946C.06 5.348 5.397.01 12.008.01c3.202.001 6.212 1.246 8.477 3.514 2.266 2.268 3.507 5.28 3.505 8.484-.004 6.657-5.34 11.997-11.953 11.997-2.005-.001-3.973-.502-5.713-1.457L0 24zm6.59-4.846c1.6.95 3.498 1.452 5.431 1.453 5.494 0 9.961-4.47 9.964-9.967.002-2.662-1.033-5.165-2.907-7.042C17.262 1.762 14.764 .724 12.008.724c-5.5 0-9.969 4.471-9.973 9.97-.001 1.924.501 3.805 1.458 5.41l-.997 3.637 3.731-.978zm11.391-6.163c-.305-.153-1.805-.891-2.084-.992-.279-.101-.482-.153-.684.153-.203.306-.783.992-.961 1.194-.178.203-.356.229-.661.077-.306-.152-1.291-.476-2.46-1.518-.91-.811-1.524-1.812-1.703-2.118-.178-.306-.019-.471.133-.622.137-.137.305-.356.458-.534.153-.178.203-.306.305-.51.101-.203.051-.381-.025-.533-.076-.153-.684-1.65-.937-2.257-.247-.602-.499-.522-.684-.531-.177-.008-.381-.01-.584-.01s-.533.076-.813.382c-.279.306-1.067 1.045-1.067 2.549 0 1.504 1.097 2.951 1.25 3.154.153.203 2.158 3.297 5.228 4.619.729.315 1.299.504 1.743.645.734.233 1.404.2 1.932.121.588-.088 1.805-.738 2.059-1.452.254-.715.254-1.324.178-1.452-.076-.127-.279-.203-.584-.356z"/></svg>
</a>

<script>
const btnMain = document.getElementById("btnMain");
const btnFloat = document.getElementById("btnFloat");
const statusTag = document.getElementById("statusTag");
const mainCard = document.getElementById("mainCard");
const floatBar = document.getElementById("floatBar");
const vol = document.getElementById("volumen");

let audio = null;
let sonando = false;

function crearAudio() {
    if (audio) {
        audio.pause();
        audio.src = "";
        audio.load();
    }
    audio = new Audio();
    // Enlace SSL directo y seguro para evitar bloqueos del navegador
    audio.src = "https://radiostreaming.pro";
    audio.crossOrigin = "anonymous";
    audio.preload = "auto";
    audio.volume = vol.value;
}

function alternarReproduccion() {
    if (!sonando) {
        crearAudio();
        statusTag.textContent = "⏳ Conectando...";
        btnMain.textContent = "⏳";
        btnFloat.textContent = "⏳";

        audio.play()
        .then(() => {
            statusTag.textContent = "🎧 EN VIVO";
            statusTag.classList.add("active");
            btnMain.textContent = "⏸";
            btnFloat.textContent = "⏸";
            mainCard.classList.add("playing");
            floatBar.classList.add("playing");
            sonando = true;
        })
        .catch(() => {
            statusTag.textContent = "⚠️ Error de señal";
            statusTag.classList.remove("active");
            btnMain.textContent = "▶";
            btnFloat.textContent = "▶";
            sonando = false;
        });
    } else {
        audio.pause();
        audio.src = "";
        audio.load();
        statusTag.textContent = "🔴 TRANSMISIÓN DETENIDA";
        statusTag.classList.remove("active");
        btnMain.textContent = "▶";
        btnFloat.textContent = "▶";
        mainCard.classList.remove("playing");
        floatBar.classList.remove("playing");
        sonando = false;
    }
}

btnMain.onclick = alternarReproduccion;
btnFloat.onclick = alternarReproduccion;

vol.oninput = () => {
    if (audio) audio.volume = vol.value;
};

// Controlar la aparición de la barra flotante según el scroll
window.onscroll = () => {
    const cardRect = mainCard.getBoundingClientRect();
    if (cardRect.bottom < 0) {
        floatBar.style.display = "flex";
    } else {
        floatBar.style.display = "none";
    }
};
</script>

<!-- Script para cargar metadatos de las canciones (Título en vivo) -->
<script id='sonic_js' data-port='8238' src='https://radiostreaming.pro'></script>
<script>
// Sincronizar el título de la canción en la barra flotante alternativamente
setInterval(() => {
    const mainTitle = document.getElementById("sonic_title");
    const floatTitle = document.getElementById("sonic_title_float");
    if(mainTitle && floatTitle) {
        floatTitle.textContent = mainTitle.textContent;
    }
}, 2000);
</script>

</body>
</html>
