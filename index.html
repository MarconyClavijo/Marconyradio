<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marcony Radio - En Vivo</title>

<style>
body{
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#111,#1f1f1f,#000);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    text-align:center;
}

.container{
    width:90%;
    max-width:400px;
    background:rgba(255,255,255,0.05);
    padding:30px;
    border-radius:20px;
    backdrop-filter:blur(10px);
    box-shadow:0 0 30px rgba(0,0,0,0.6);
}

.logo{
    width:200px;
    margin-bottom:20px;
    border-radius:20px;
}

h1{
    margin:10px 0;
    font-size:26px;
    letter-spacing:1px;
}

button{
    margin:10px;
    padding:12px 25px;
    border:none;
    border-radius:30px;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

.play{
    background:#00c853;
    color:white;
}

.stop{
    background:#d50000;
    color:white;
}

button:hover{
    transform:scale(1.05);
}

.status{
    margin-top:15px;
    font-size:14px;
    opacity:0.8;
}
</style>
</head>

<body>

<div class="container">
    <img src="https://image2url.com/r2/default/images/1772424553305-5e1866b9-0926-4d13-9fad-dae04af28c89.png" class="logo">
    
    <h1>🎙 MARCONY RADIO</h1>
    <p>Transmitiendo en vivo 24/7</p>

    <audio id="radio" preload="none">
        <source src="https://radiostreaming.pro:8214/stream" type="audio/mpeg">
        Tu navegador no soporta audio.
    </audio>

    <div>
        <button class="play" onclick="playRadio()">▶ PLAY</button>
        <button class="stop" onclick="stopRadio()">⏹ STOP</button>
    </div>

    <div class="status" id="status">Radio detenida</div>
</div>

<script>
const radio = document.getElementById("radio");
const statusText = document.getElementById("status");

function playRadio(){
    radio.load();
    radio.play();
    statusText.innerText = "🔴 En Vivo...";
}

function stopRadio(){
    radio.pause();
    radio.currentTime = 0;
    statusText.innerText = "Radio detenida";
}

radio.addEventListener("error", function(){
    statusText.innerText = "⚠ Error de conexión con el streaming";
});
</script>

</body>
</html>
