<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marcony Radio - En Vivo</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:'Montserrat', sans-serif;
    background: radial-gradient(circle at top,#1a001f,#000);
    color:white;
    text-align:center;
    overflow-x:hidden;
}

/* Fondo animado elegante */
body::before{
    content:"";
    position:fixed;
    width:200%;
    height:200%;
    background: linear-gradient(45deg,#ff00cc,#00ffff,#ff0066,#3300ff);
    animation: bgMove 12s linear infinite;
    opacity:0.08;
    z-index:0;
}
@keyframes bgMove{
    0%{transform:rotate(0deg);}
    100%{transform:rotate(360deg);}
}

.container{
    position:relative;
    z-index:2;
    padding:40px 20px;
}

/* Logo girando tipo vinilo */
.logo{
    width:220px;
    border-radius:50%;
    box-shadow:0 0 40px #ff00cc;
    animation: spin 8s linear infinite;
}
@keyframes spin{
    from{transform:rotate(0deg);}
    to{transform:rotate(360deg);}
}

h1{
    font-family:'Orbitron', sans-serif;
    font-size:30px;
    margin-top:20px;
    text-shadow:0 0 20px #ff00cc;
}

.subtitle{
    font-size:14px;
    letter-spacing:2px;
    opacity:0.8;
    margin-bottom:30px;
}

/* Botón principal */
.playBtn{
    background:#ff0066;
    border:none;
    padding:18px 40px;
    font-size:18px;
    border-radius:50px;
    color:white;
    cursor:pointer;
    box-shadow:0 0 25px #ff0066;
    transition:0.3s;
}
.playBtn:hover{
    transform:scale(1.08);
    box-shadow:0 0 45px #ff0066;
}

.status{
    margin-top:20px;
    font-size:14px;
    color:#00ffff;
}

/* Redes */
.social{
    margin-top:40px;
}

.social a{
    display:inline-block;
    margin:10px;
    padding:12px 25px;
    border-radius:30px;
    text-decoration:none;
    color:white;
    font-size:14px;
    transition:0.3s;
}

.fb{
    background:#1877f2;
}

.wa{
    background:#25d366;
}

.social a:hover{
    transform:scale(1.1);
}

/* Footer */
footer{
    margin-top:60px;
    font-size:12px;
    opacity:0.6;
    padding-bottom:20px;
}
</style>
</head>

<body>

<div class="container">

<img src="https://image2url.com/r2/default/images/1772424553305-5e1866b9-0926-4d13-9fad-dae04af28c89.png" class="logo">

<h1>MARCONY RADIO</h1>
<div class="subtitle">Transmitiendo en vivo 24/7</div>

<audio id="radio" preload="none">
<source src="https://radiostreaming.pro/8214/stream?nocache=" + new Date().getTime() type="audio/mpeg">
</audio>

<button class="playBtn" onclick="toggleRadio()">▶ ESCUCHAR EN VIVO</button>

<div class="status" id="status">Radio detenida</div>

<div class="social">
<a class="fb" href="https://www.facebook.com/radiomarcony" target="_blank">📘 Facebook</a>
<a class="wa" href="https://wa.me/51942883375" target="_blank">💬 WhatsApp</a>
</div>

<footer>
Página creada por Marcony Clavijo
</footer>

</div>

<script>
const radio = document.getElementById("radio");
const statusText = document.getElementById("status");
const button = document.querySelector(".playBtn");

let playing = false;

function toggleRadio(){
    if(!playing){
        radio.src = "https://radiostreaming.pro/8214/stream?nocache=" + new Date().getTime();
        radio.play();
        statusText.innerText = "🔴 EN VIVO";
        button.innerText = "⏹ DETENER";
        playing = true;
    }else{
        radio.pause();
        radio.src = "";
        statusText.innerText = "Radio detenida";
        button.innerText = "▶ ESCUCHAR EN VIVO";
        playing = false;
    }
}

radio.addEventListener("error", function(){
    statusText.innerText = "⚠ Error conectando al streaming";
});
</script>

</body>
</html>
