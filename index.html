<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La Tremenda 106.5 FM</title>
<link href="https://googleapis.com" rel="stylesheet">
<style>
:root {
  --bg-main: #060d1a;
  --bg-card: #0b1528;
  --accent-yellow: #f1b80c;
  --accent-green: #00e676;
  --text-primary: #ffffff;
  --text-secondary: #8fa0ba;
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: 'Poppins', sans-serif;
  background-color: var(--bg-main);
  color: var(--text-primary);
  min-height: 100vh;
  padding-bottom: 90px; /* Espacio para el reproductor flotante */
}

/* Barra de navegación */
.navbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 20px;
  background-color: rgba(6, 13, 26, 0.8);
  backdrop-filter: blur(10px);
  position: sticky;
  top: 0;
  z-index: 100;
}

.nav-logo {
  height: 45px;
}

.menu-btn {
  background: none;
  border: none;
  color: var(--text-primary);
  font-size: 24px;
  cursor: pointer;
}

/* Contenedor Principal */
.main-container {
  width: 92%;
  max-width: 480px;
  margin: 20px auto;
}

/* Sección Ahora Sonando */
.section-title {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 18px;
  font-weight: 700;
  text-transform: uppercase;
  margin-bottom: 20px;
}

.section-title::before {
  content: '';
  display: inline-block;
  width: 4px;
  height: 20px;
  background-color: var(--accent-yellow);
  border-radius: 2px;
}

.live-badge {
  font-size: 11px;
  color: var(--accent-green);
  background: rgba(0, 230, 118, 0.1);
  padding: 2px 8px;
  border-radius: 12px;
  font-weight: 600;
  margin-left: auto;
}

/* Tarjeta del Reproductor Estático */
.player-card {
  background-color: var(--bg-card);
  border-radius: 24px;
  padding: 25px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  text-align: center;
}

.banner-container {
  width: 100%;
  aspect-ratio: 1;
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 8px 20px rgba(0,0,0,0.4);
  margin-bottom: 20px;
}

.banner-img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.info-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  text-align: left;
  margin-bottom: 15px;
}

.song-title {
  font-size: 20px;
  font-weight: 700;
  color: var(--text-primary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.artist-name {
  font-size: 14px;
  color: var(--text-secondary);
}

/* Ecualizador animado */
.eq-mini {
  display: flex;
  gap: 3px;
  height: 18px;
  align-items: flex-end;
}

.eq-mini span {
  width: 3px;
  height: 3px;
  background-color: var(--accent-yellow);
  animation: bounce .6s infinite alternate linear;
  animation-play-state: paused;
}

.playing .eq-mini span { animation-play-state: running; }
.eq-mini span:nth-child(1) { animation-delay: 0.1s; }
.eq-mini span:nth-child(2) { animation-delay: 0.4s; }
.eq-mini span:nth-child(3) { animation-delay: 0.2s; }
.eq-mini span:nth-child(4) { animation-delay: 0.5s; }

@keyframes bounce {
  100% { height: 18px; }
}

/* Programa y Progreso */
.show-info {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 13px;
  color: var(--accent-yellow);
  margin-bottom: 15px;
  text-align: left;
}

.progress-container {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 11px;
  color: var(--text-secondary);
  margin-bottom: 25px;
}

.progress-bar {
  flex: 1;
  height: 4px;
  background: rgba(255,255,255,0.1);
  border-radius: 2px;
  overflow: hidden;
}

.progress-fill {
  width: 45%;
  height: 100%;
  background: linear-gradient(90deg, #00bcd4, var(--accent-yellow));
}

/* Controles */
.controls-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 15px;
}

.btn-main-play {
  width: 64px;
  height: 64px;
  border-radius: 50%;
  background-color: var(--accent-yellow);
  border: none;
  color: #000;
  font-size: 24px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform 0.2s;
  box-shadow: 0 4px 15px rgba(241, 184, 12, 0.4);
}

.btn-main-play:hover { transform: scale(1.05); }

.status-block {
  text-align: left;
  flex: 1;
}

.status-text {
  font-size: 15px;
  font-weight: 600;
}

.listeners-count {
  font-size: 12px;
  color: var(--text-secondary);
  display: flex;
  align-items: center;
  gap: 5px;
}

.listeners-count::before {
  content: '';
  width: 6px;
  height: 6px;
  background-color: var(--accent-green);
  border-radius: 50%;
  display: inline-block;
}

/* Feedback de votos */
.vote-box {
  display: flex;
  gap: 8px;
}

.btn-vote {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  padding: 8px 12px;
  border-radius: 12px;
  color: var(--text-primary);
  font-size: 12px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 5px;
}

/* Historial de canciones */
.history-section {
  margin-top: 30px;
}

.history-item {
  display: flex;
  align-items: center;
  gap: 12px;
  background: rgba(255,255,255,0.03);
  padding: 10px;
  border-radius: 14px;
  margin-bottom: 10px;
}

.history-thumb {
  width: 45px;
  height: 45px;
  border-radius: 8px;
  object-fit: cover;
}

.history-info {
  flex: 1;
  text-align: left;
}

.history-title {
  font-size: 14px;
  font-weight: 600;
}

.history-artist {
  font-size: 12px;
  color: var(--text-secondary);
}

/* REPRODUCTOR FLOTANTE INFERIOR */
.floating-player {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: rgba(11, 21, 40, 0.95);
  backdrop-filter: blur(15px);
  border-top: 1px solid rgba(255,255,255,0.1);
  padding: 12px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  z-index: 999;
  box-shadow: 0 -5px 25px rgba(0,0,0,0.5);
  transform: translateY(100%);
  transition: transform 0.3s ease;
}

.floating-player.visible {
  transform: translateY(0);
}

.float-info {
  display: flex;
  align-items: center;
  gap: 12px;
  max-width: 70%;
}

.float-thumb {
  width: 40px;
  height: 40px;
  border-radius: 6px;
  object-fit: cover;
}

.float-text {
  text-align: left;
  overflow: hidden;
}

.float-title {
  font-size: 14px;
  font-weight: 600;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.float-artist {
  font-size: 12px;
  color: var(--text-secondary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.btn-float-play {
  width: 42px;
  height: 42px;
  border-radius: 50%;
  background-color: var(--accent-yellow);
  border: none;
  color: #000;
  font-size: 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* BOTÓN FLOTANTE DE WHATSAPP */
.whatsapp-btn {
  position: fixed;
  bottom: 85px; /* Posicionado justo encima del reproductor flotante */
  right: 20px;
  width: 56px;
  height: 56px;
  background-color: var(--accent-green);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 4px 15px rgba(0, 230, 118, 0.4);
  z-index: 1000;
  transition: transform 0.2s;
}

.whatsapp-btn:hover { transform: scale(1.08); }
.whatsapp-btn img { width: 30px; height: 30px; }

</style>
</head>
<body>

<!-- Navegación superior -->
<nav class="navbar">
  <!-- Reemplazado por el link del logo actualizado enviado -->
  <img src="https://imgfz.com" alt="La Tremenda" class="nav-logo">
