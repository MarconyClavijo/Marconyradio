<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La Tremenda 106.5 FM</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">
<style>
body {
margin:0;
font-family:'Poppins',sans-serif;
background:#0c0f17;
color:#fff;
min-height:100vh;
display:flex;
flex-direction:column;
align-items:center;
padding-bottom:90px;
box-sizing:border-box;
}

/* BANNER DE FONDO ADAPTADO */
.main-banner {
width:100%;
height:220px;
background:linear-gradient(to bottom, rgba(12,15,23,0.1), #0c0f17), url('http://imgfz.com/i/BzRwbrP.png') no-repeat center center;
background-size:cover;
display:flex;
justify-content:center;
align-items:center;
}

/* REPRODUCTOR ESTÁTICO PRINCIPAL */
.app {
width:92%;
max-width:420px;
background:rgba(20,26,38,0.9);
backdrop-filter:blur(15px);
border-radius:30px;
padding:25px 20px;
box-shadow:0 15px 40px rgba(0,0,0,0.6);
text-align:center;
color:#fff;
margin-top:-50px;
border:1px solid rgba(255,255,255,0.05);
box-sizing:border-box;
z-index:10;
}

.logo {
width:130px;
margin:5px 0 15px 0;
filter:drop-shadow(0 0 10px rgba(255,255,255,0.2));
}

.player-box {
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.1);
border-radius:20px;
padding:20px;
margin-top:10px;
}

.status {
font-weight:bold;
margin-bottom:10px;
color:#0f0;
font-size:14px;
letter-spacing:1px;
}

.song {
font-size:14px;
margin-bottom:15px;
color:#fff;
opacity:.9;
min-height:21px;
}

.play {
padding:16px;
width:100%;
font-size:22px;
font-weight:900;
border:none;
border-radius:15px;
background:#00d95f;
color:#fff;
cursor:pointer;
transition:.3s;
box-shadow:0 0 20px rgba(0,255,100,.4);
}

.play:hover {
transform:scale(1.03);
}

.volume {
margin-top:15px;
display:flex;
align-items:center;
gap:10px;
}

input[type=range] {
flex:1;
accent-color:#00d95f;
cursor:pointer;
}

/* ECUALIZADOR DINÁMICO */
.eq {
display:flex;
justify-content:center;
gap:6px;
margin:15px 0;
height:30px;
align-items:flex-end;
}

.eq span {
width:6px;
height:6px;
background:#00ff00;
border-radius:3px;
transition: 0.2s;
}

.playing .eq span {
animation:eco .6s infinite alternate;
}

.playing .eq span:nth-child(1) { animation-delay: .1s; }
.playing .eq span:nth-child(2) { animation-delay: .4s; }
.playing .eq span:nth-child(3) { animation-delay: .2s; }
.playing .eq span:nth-child(4) { animation-delay: .5s; }
.playing .eq span:nth-child(5) { animation-delay: .3s; }

@keyframes eco {
0% { height:6px; }
100% { height:30px; }
}

.social-container {
display:flex;
gap:10px;
margin-top:15px;
}

.social-box {
flex:1;
padding:12px;
border-radius:12px;
font-weight:bold;
text-decoration:none;
color:#fff;
text-align:center;
transition:.3s;
font-size:14px;
}

.facebook { background:#1877f2; }
.whatsapp-btn { background:#00bb2d; }

.social-box:hover {
transform:scale(1.05);
}

.footer {
margin:25px 0 10px 0;
color:#fff;
font-size:12px;
opacity:.5;
text-align:center;
}

/* REPRODUCTOR FLOTANTE INFERIOR */
.float-player {
position:fixed;
bottom:0;
left:0;
width:100%;
background:rgba(15,21,32,0.95);
backdrop-filter:blur(15px);
border-top:1px solid rgba(255,255,255,0.08);
padding:12px 20px;
display:none;
justify-content:space-between;
align-items:center;
box-sizing:border-box;
z-index:999;
box-shadow:0 -5px 25px rgba(0,0,0,0.5);
}

.float-info {
display:flex;
align-items:center;
gap:12px;
max-width:75%;
}

.float-img {
width:40px;
height:40px;
border-radius:8px;
object-fit:cover;
}

.float-text {
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
}

.float-title { font-size:14px; font-weight:700; color:#fff; }
.float-sub { font-size:12px; color:#a1a1a6; }

.float-btn {
width:42px;
height:42px;
border-radius:50%;
border:none;
background:#00d95f;
color:#fff;
font-size:16px;
cursor:pointer;
display:flex;
justify-content:center;
align-items:center;
box-shadow:0 4px 12px rgba(0,217,95,0.3);
}

/* BOTÓN FLOTANTE WHATSAPP URBANO */
.whatsapp-float {
position:fixed;
bottom:80px;
right:20px;
width:56px;
height:56px;
background:#25d366;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
box-shadow:0 4px 15px rgba(37,211,102,0.4);
z-index:998;
transition:0.3s;
}

.whatsapp-float:hover { transform:scale(1.08); }
.whatsapp-float svg { width:28px; height:28px; fill:#fff; }
</style>
</head>
<body>

<!-- Sección del Banner Superior -->
<div class="main-banner"></div>

<!-- Contenedor Principal / Reproductor Estático -->
<div class="app" id="app">
    <img src="http://imgfz.com/i/VEazsCp.png" class="logo" alt="Logo">
    
    <div class="player-box">
        <div class="status" id="estado">🔴 EN VIVO</div>
        
        <div class="song">
            <span id="sonic_title">Cargando canción...</span>
        </div>
        
        <div class="eq">
            <span></span><span></span><span></span><span></span><span></span>
        </div>
        
        <button class="play" id="btn">▶ REPRODUCIR</button>
        
        <div class="volume">
            <span>🔈</span>
            <input type="range" min="0" max="1" step="0.01" value="1" id="volumen">
            <span>🔊</span>
        </div>
    </div>

    <div class="social-container">
        <a class="social-box facebook" href="https://www.facebook.com/profile.php?id=61585616422921" target="_blank">Facebook</a>
        <a class="social-box whatsapp-btn" href="https://wa.me/51942883375" target="_blank">WhatsApp</a>
    </div>
    
    <div class="footer">
        Diseño por Marcony Clavijo – Radio La Tremenda
    </div>
</div>

<!-- Barra de Reproducción Flotante Inferior -->
<div class="float-player" id="floatBar">
    <div class="float-info">
        <img src="http://imgfz.com/i/VEazsCp.png" class="float-img" alt="Mini Logo">
        <div class="float-text">
            <div class="float-title">La Tremenda 106.5 FM</div>
            <div class="float-sub" id="sonic_title_float">Cargando canción...</div>
        </div>
    </div>
    <button class="float-btn" id="btnFloat">▶</button>
</div>

<!-- Botón Flotante de WhatsApp Seguro -->
<a href="https://wa.me/51942883375" class="whatsapp-float" target="_blank">
    <svg viewBox="0 0 24 24"><path d="M.057 24l1.687-6.163c-1.041-1.804-1.588-3.849-1.587-5.946C.06 5.348 5.397.01 12.008.01c3.202.001 6.212 1.246 8.477 3.514 2.266 2.268 3.507 5.28 3.505 8.484-.004 6.657-5.34 11.997-11.953 11.997-2.005-.001-3.973-.502-5.713-1.457L0 24zm6.59-4.846c1.6.95 3.498 1.452 5.431 1.453 5.494 0 9.961-4.47 9.964-9.967.002-2.662-1.033-5.165-2.907-7.042C17.262 1.762 14.764 .724 12.008.724c-5.5 0-9.969 4.471-9.973 9.97-.001 1.924.501 3.805 1.458 5.41l-.997 3.637 3.731-.978zm11.391-6.163c-.305-.153-1.805-.891-2.084-.992-.279-.101-.482-.153-.684.153-.203.306-.783.992-.961 1.194-.178.203-.356.229-.661.077-.306-.152-1.291-.476-2.46-1.518-.91-.811-1.524-1.812-1.703-2.118-.178-.306-.019-.471.133-.622.137-.137.305-.356.458-.534.153-.178.203-.306.305-.51.101-.203.051-.381-.025-.533-.076-.153-.684-1.65-.937-2.257-.247-.602-.499-.522-.684-.531-.177-.008-.381-.01-.584-.01s-.533.076-.813.382c-.279.306-1.067 1.045-1.067 2.549 0 1.504 1.097 2.951 1.25 3.154.153.203 2.158 3.297 5.228 4.619.729.315 1.299.504 1.743.645.734.233 1.404.2 1.932.121.588-.088 1.805-.738 2.059-1.452.254-.715.254-1.324.178-1.452-.076-.127-.279-.203-.584-.356z"/></svg>
</a>

<script>
const btn = document.getElementById("btn");
const btnFloat = document.getElementById("btnFloat");
const estado = document.getElementById("estado");
const app = document.getElementById("app");
const floatBar = document.getElementById("floatBar");
const vol = document.getElementById("volumen");

let audio = null;
let sonando = false;

function crearAudio() {
    if (audio) {
        audio.pause();
        audio.src = "";
        audio.load();
    }
    audio = new Audio();
    // Enlace directo SSL para prevenir bloqueos por contenido mixto en GitHub Pages
    audio.src = "https://radiostreaming.pro";
    audio.crossOrigin = "anonymous";
    audio.preload = "auto";
    audio.volume = vol.value;
}

function alternarAudio() {
    if (!sonando) {
        crearAudio();
        estado.textContent = "⏳ Conectando...";
        btn.textContent = "⏳";
        btnFloat.textContent = "⏳";

        audio.play()
        .then(() => {
            estado.textContent = "🎧 EN VIVO - TIEMPO REAL";
            btn.textContent = "⏸ DETENER";
            btnFloat.textContent = "⏸";
            app.classList.add("playing");
            sonando = true;
        })
        .catch(() => {
            estado.textContent = "⚠️ Error de conexión";
            btn.textContent = "▶ REPRODUCIR";
            btnFloat.textContent = "▶";
            sonando = false;
        });
    } else {
        audio.pause();
        audio.src = "";
        audio.load();
        estado.textContent = "⏹ TRANSMISIÓN DETENIDA";
        btn.textContent = "▶ REPRODUCIR";
        btnFloat.textContent = "▶";
        app.classList.remove("playing");
        sonando = false;
    }
}

btn.onclick = alternarAudio;
btnFloat.onclick = alternarAudio;

vol.oninput = () => {
    if (audio) audio.volume = vol.value;
};

// Controlar visibilidad del reproductor flotante en el scroll
window.onscroll = () => {
    const appRect = app.getBoundingClientRect();
    if (appRect.bottom < 0) {
        floatBar.style.display = "flex";
    } else {
        floatBar.style.display = "none";
    }
};
</script>

<!-- Script oficial externo para la metadata de las canciones -->
<script id='sonic_js' data-port='8238' src='https://radiostreaming.pro/cp/widgets.js'></script>
<script>
// Sincronizar dinámicamente el título cambiante en la barra flotante inferior
setInterval(() => {
    const srcTitle = document.getElementById("sonic_title");
    const destTitle = document.getElementById("sonic_title_float");
    if(srcTitle && destTitle) {
        destTitle.textContent = srcTitle.textContent;
    }
}, 2000);
</script>

</body>
</html>
