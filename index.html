<section class="banner">

<h1>

LA TREMENDA

<span>106.5 FM</span>

</h1>

<div class="cover">

<img id="cover"

<i class="fa-solid fa-play"></i>

</button>

<audio id="audio">

<source src="https://radiostreaming.pro/8238/stream">

</audio>

<div class="volume">

<input
type="range"
min="0"
max="1"
step="0.01"
value="1"
id="volume">

</div>

<div class="equalizer">
